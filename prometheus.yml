# prometheus.yml
global:
  scrape_interval: 1m
  evaluation_interval: 1m 

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'agent'
    static_configs:
      - targets: ['agent:5005']

  - job_name: 'bff'
    static_configs:
      - targets: ['bff:8070']

  - job_name: 'follow-up'
    static_configs:
      - targets: ['follow-up-agent:8000']