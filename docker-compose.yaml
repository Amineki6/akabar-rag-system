# This is the combined configuration for production.
version: '3.8'

services:
  # ---------------------
  #  Backend Services
  # ---------------------
  agent:
    build: ./agent
    container_name: agent
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 2 app:app --bind 0.0.0.0:5005
    volumes:
      - ./agent/data-lake:/app/data-lake
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/chat_logs?authSource=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - EXCHANGERATE_API_KEY=${EXCHANGERATE_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
      - redis-seeder
    networks:
      - app-network

  bff:
    build: ./bff
    container_name: bff
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 2 app:app --bind 0.0.0.0:8070
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/chat_logs?authSource=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AGENT_HOSTNAME=agent
      - FOLLOWUP_HOSTNAME=follow-up-agent
      - ENVIRONMENT=production
    depends_on:
      - mongo
      - redis
      - agent
      - weather-api
      - redis-seeder
    networks:
      - app-network

  weather-api:
    build: ./utils-services/weather-api
    container_name: weather-api
    command: python app.py
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  follow-up-agent:
    build: ./utils-services/follow-up-agent
    container_name: follow-up-agent
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 1 app:app --bind 0.0.0.0:8000
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/chat_logs?authSource=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  # ---------------------
  #  Frontend Service
  # ---------------------
  web:
    build:
     context: ./web
     args:
        - VITE_MAPBOX_ACCESS_TOKEN=${VITE_MAPBOX_ACCESS_TOKEN}
    container_name: web
    depends_on:
      - bff
    networks:
      - app-network

  # ---------------------
  #  Monitoring Services
  # ---------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-akabar}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

  # ---------------------
  #  Databases
  # ---------------------
  mongo:
    image: mongo:latest
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    # --- ADD THIS ENTIRE ENVIRONMENT SECTION ---
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    # --- END OF ADDED SECTION ---
    command: mongod --auth
    networks:
      - app-network
      - akabar_books_shared_network

  redis:
    image: redis/redis-stack:latest
    volumes:
      - redis-data:/data
    networks:
      - app-network
      - akabar_books_shared_network

  # -----------------------------------
  #  Data Seeding Service
  # -----------------------------------
  redis-seeder:
    build: ./helper_func
    container_name: redis-seeder
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  # -----------------------------------
  #  Nginx Reverse Proxy Service
  # -----------------------------------
  nginx-proxy:
   image: nginx:latest
   container_name: akabar-nginx-proxy-1
   ports:
     - "80:80"
     - "443:443"
   volumes:
     - ./nginx.conf:/etc/nginx/conf.d/default.conf
     - certbot-etc:/etc/letsencrypt
     - certbot-var:/var/lib/letsencrypt
     - web-root:/var/www/certbot
     - ./nginx/ssl_conf/options-ssl-nginx.conf:/etc/letsencrypt/options-ssl-nginx.conf:ro
     - ./nginx/ssl_conf/ssl-dhparams.pem:/etc/letsencrypt/ssl-dhparams.pem:ro
   depends_on:
     - web
     - bff
   restart: unless-stopped
   networks:
     - app-network
     - akabar_books_shared_network

  certbot:
   image: certbot/certbot
   container_name: certbot
   volumes:
     - certbot-etc:/etc/letsencrypt
     - certbot-var:/var/lib/letsencrypt
     - web-root:/var/www/certbot
   command: certonly --webroot --webroot-path=/var/www/certbot --email kinaamine@gmail.com --agree-tos --no-eff-email --non-interactive -d akabar.ai -d www.akabar.ai
   networks:
     - app-network

# ---------------------
#  Volumes and Networks
# ---------------------
volumes:
  mongo-data:
  redis-data:
  certbot-etc:
  certbot-var:
  web-root:
  prometheus_data: {}
  grafana_data: {}

networks:
  app-network:
    driver: bridge
  akabar_books_shared_network:
    name: akabar_books_shared_network
