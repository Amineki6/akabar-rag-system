<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akabar CMS - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 40px;
        }
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .dash-header h1 {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: 42px;
            color: var(--dark);
            margin: 0;
            letter-spacing: -1px;
        }
        .actions-col {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 100px;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-outline {
            background: transparent;
            color: var(--dark);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background: rgba(0,0,0,0.03);
            border-color: var(--dark);
        }
        .btn-danger {
            background: transparent;
            color: #d9534f;
        }
        .btn-danger:hover {
            background: #d9534f;
            color: white;
            border-color: #d9534f;
        }
        
        .table-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            padding: 20px 24px;
            background: rgba(0,0,0,0.02);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 20px 24px;
            font-size: 14px;
            color: var(--dark);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(0,0,0,0.01);
        }
        .post-title-cell {
            font-weight: 500;
            font-size: 15px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-draft { background: #f0ede6; color: var(--muted); }
        .badge-published { background: rgba(98, 184, 122, 0.15); color: #3a8a50; }
        .badge-featured { background: rgba(232, 114, 26, 0.15); color: var(--orange); }
        .row-actions { display: flex; gap: 8px; }
        .row-actions button {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--dark);
        }
        .row-actions button:hover { background: rgba(0,0,0,0.04); }
        .row-actions .del-btn { color: #d9534f; border-color: rgba(217, 83, 79, 0.3); }
        .row-actions .del-btn:hover { background: #d9534f; color: white; }
    </style>
</head>
<body>

    <!-- Small simplified nav -->
    <nav style="position:static; padding: 20px 40px;  border-bottom: 1px solid var(--border);">
      <div class="nav-left">
        <span class="logo">Akabar CMS</span>
      </div>
      <div class="nav-right">
        <a href="/" class="btn btn-outline" style="padding: 6px 16px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Public Site
        </a>
      </div>
    </nav>

    <div class="dashboard-layout">
        <div class="dash-header">
            <h1>Dashboard</h1>
            <div class="actions-col">
                <a href="/admin/editor.html" class="btn btn-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Create Post
                </a>
                <button class="btn btn-outline" id="logout-btn">Logout</button>
            </div>
        </div>

        <div class="table-card">
            <table id="posts-table">
                <thead>
                    <tr>
                        <th>Details</th>
                        <th>SubTitle</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="posts-body">
                    <tr><td colspan="5" style="text-align: center; color: var(--muted); padding: 40px;">Loading articles...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/';
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/';
        });

        // Load posts
        async function loadPosts() {
            try {
                const response = await fetch('/api/blogs/admin', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const posts = await response.json();
                    renderPosts(posts);
                } else if (response.status === 401) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/admin/';
                } else {
                    document.getElementById('posts-body').innerHTML = '<tr><td colspan="5" style="text-align:center;">Failed to load posts.</td></tr>';
                }
            } catch (error) {
                console.error('Error fetching posts:', error);
                document.getElementById('posts-body').innerHTML = '<tr><td colspan="5" style="text-align:center;">System error.</td></tr>';
            }
        }

        function renderPosts(posts) {
            const tbody = document.getElementById('posts-body');
            tbody.innerHTML = '';
            
            if (posts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px;">No posts found. Start writing!</td></tr>';
                return;
            }

            posts.forEach(post => {
                const date = new Date(post.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                
                let statusBadges = '';
                if (post.is_published) {
                    statusBadges += `<span class="badge badge-published">Published</span>`;
                } else {
                    statusBadges += `<span class="badge badge-draft">Draft</span>`;
                }
                
                if (post.is_featured) {
                    statusBadges += ` <span class="badge badge-featured"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Featured</span>`;
                }
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="post-title-cell">
                        ${post.title}
                        <div style="font-size: 12px; color: var(--muted); font-weight: normal; margin-top:4px;">/${post.slug}</div>
                    </td>
                    <td><span class="badge badge-draft" style="background:transparent; border:1px solid var(--border);">${post.subtitle || 'None'}</span></td>
                    <td style="color:var(--muted);">${date}</td>
                    <td>${statusBadges}</td>
                    <td>
                        <div class="row-actions">
                            <button onclick="editPost('${post.slug}')">Edit</button>
                            <button class="del-btn" onclick="deletePost('${post.slug}')">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function editPost(slug) {
            window.location.href = `/admin/editor.html?slug=${slug}`;
        }

        async function deletePost(slug) {
            if (confirm('Are you sure you want to delete this post? This action cannot be undone.')) {
                try {
                    const response = await fetch(`/api/blogs/${slug}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok || response.status === 204) {
                        loadPosts(); // Refresh the list seamlessly
                    } else if (response.status === 401) {
                        localStorage.removeItem('adminToken');
                        window.location.href = '/admin/';
                    } else {
                        const err = await response.json();
                        alert(`Failed to delete: ${err.detail || 'Unknown error'}`);
                    }
                } catch (error) {
                    console.error('Error deleting post:', error);
                    alert('A system error occurred while deleting.');
                }
            }
        }

        // Initialize dashboard
        loadPosts();
    </script>
</body>
</html>
