<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akabar CMS - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f5; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 320px; }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: #333; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #e07a5f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background-color: #d0694e; }
        #error-msg { color: #d9534f; font-size: 0.875rem; display: none; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Admin Login</h1>
        <p id="error-msg">Invalid username or password.</p>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <a href="/admin/register.html" style="display: block; text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #555; text-decoration: none;">Don't have an account? Register</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent the default form submission reload
            
            // FastAPI's OAuth2 expects 'application/x-www-form-urlencoded' data, not JSON!
            // URLSearchParams formats the data correctly for this endpoint.
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Save the token to the browser's local storage
                    localStorage.setItem('adminToken', data.access_token);
                    // Redirect to the CMS dashboard page
                    window.location.href = '/admin/dashboard.html';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (error) {
                console.error('Login failed:', error);
                document.getElementById('error-msg').innerText = 'System error. Try again.';
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
