<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akabar CMS - Register</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f5; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 320px; }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: #333; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #e07a5f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background-color: #d0694e; }
        #msg-container { padding: 0.8rem; border-radius: 4px; display: none; margin-bottom: 1rem; text-align: center; font-size: 0.875rem; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .link-text { display: block; text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #555; text-decoration: none; }
        .link-text:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Admin Registration</h1>
        <div id="msg-container"></div>
        <form id="register-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <a href="/admin/index.html" class="link-text">Already have an account? Login</a>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const msgContainer = document.getElementById('msg-container');
            msgContainer.style.display = 'none';

            const payload = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    msgContainer.className = 'success';
                    msgContainer.innerText = 'Registration successful! You can now login.';
                    msgContainer.style.display = 'block';
                    document.getElementById('register-form').reset();
                    // Optional: Redirect after a few seconds
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 2000);
                } else {
                    const errorData = await response.json();
                    msgContainer.className = 'error';
                    msgContainer.innerText = errorData.detail || 'Registration failed.';
                    msgContainer.style.display = 'block';
                }
            } catch (error) {
                console.error('Registration failed:', error);
                msgContainer.className = 'error';
                msgContainer.innerText = 'System error. Try again.';
                msgContainer.style.display = 'block';
            }
        });
    </script>
</body>
</html>
