apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: akabar-bff-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bff  # Must match your Service name
                port:
                  number: 80
---

apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: default
spec:
  selector:
    app: akabar-bff         # This finds the pods labeled "akabar-bff" defined above
  ports:
    - protocol: TCP
      port: 80              # The port the Service listens on
      targetPort: 8070        # The port the Container is listening on
  type: ClusterIP           # Internal only (we will expose it differently later)
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: akabar-bff
  namespace: default
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: akabar-bff
  template:
    metadata:
      labels:
        app: akabar-bff
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: bff
        image: mkina66/akabar-bff:sha-3a50db3
        ports:
        - containerPort: 8070
        envFrom:
        - secretRef:
            name: akabar-secrets
