# --------------------------------------------------------
# PRIMARY DOMAIN: akabar.ai
# --------------------------------------------------------

# Server block to handle HTTP traffic (port 80)
server {
    listen 80;
    server_name akabar.ai www.akabar.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Server block to handle HTTPS traffic (port 443)
server {
    listen 443 ssl;
    http2 on;
    server_name akabar.ai www.akabar.ai;

    # Docker's internal DNS resolver. The variable forces runtime resolution.
    resolver 127.0.0.11 valid=30s;

    ssl_certificate /etc/letsencrypt/live/akabar.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akabar.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Route API calls for the 'books' app ---
    location /api/books/ {
        set $upstream_books bff-books:8070;
        proxy_pass http://$upstream_books;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
    }

    # --- Route ORIGINAL API calls to the BFF service ---
    location /api/ {
        set $upstream_bff bff:8070;
        proxy_pass http://$upstream_bff;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
    }
    
    # --- Route traffic for the 'books' frontend ---
    location /books/ {
        set $upstream_web_books web-books:80;
        rewrite /books/(.*) /$1 break;
    
        proxy_pass http://$upstream_web_books;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Route all other traffic to the ORIGINAL web (frontend) service ---
    location / {
        set $upstream_web web:80;
        proxy_pass http://$upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --------------------------------------------------------
# SUBDOMAIN: forgedsouls.akabar.ai
# --------------------------------------------------------

# Server block to handle HTTP traffic (port 80)
