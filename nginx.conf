    listen 443 ssl;
    http2 on;
    server_name forgedsouls.akabar.ai;

    resolver 127.0.0.11 valid=30s;

    # IMPORTANT: Nginx will fail to start if these certificate files do not exist yet.
    ssl_certificate /etc/letsencrypt/live/forgedsouls.akabar.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forgedsouls.akabar.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
