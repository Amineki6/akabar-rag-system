version: '3.8'

services:
  # ---------------------
  #  Backend Services
  # ---------------------
  agent:
    build: ./agent
    container_name: agent
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 2 app:app --bind 0.0.0.0:5005
    volumes:
      - ./agent/data-lake:/app/data-lake
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/maindb?authSource=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - EXCHANGERATE_API_KEY=${EXCHANGERATE_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
      - redis-seeder
    networks:
      - app-network

  bff:
    build: ./bff
    container_name: bff
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 2 app:app --bind 0.0.0.0:8070
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/maindb?authSource=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AGENT_HOSTNAME=agent
      - FOLLOWUP_HOSTNAME=follow-up-agent
      - ENVIRONMENT=production
    depends_on:
      - mongo
      - redis
      - agent
      - weather-api
      - redis-seeder
    networks:
      - app-network

  weather-api:
    build: ./utils-services/weather-api
    container_name: weather-api
    command: python app.py
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  follow-up-agent:
    build: ./utils-services/follow-up-agent
    container_name: follow-up-agent
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 1 app:app --bind 0.0.0.0:8000
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/maindb?authSource=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  # ---------------------
  #  Frontend Service
  # ---------------------
  web:
    build:
     context: ./web
     args:
        - VITE_MAPBOX_ACCESS_TOKEN=${VITE_MAPBOX_ACCESS_TOKEN}
    container_name: web
    depends_on:
      - bff
    networks:
      - app-network

  # ---------------------
  #  Blog Services <-- NEW SECTION
  # ---------------------
  blog-frontend:
    build: 
      context: ./apps/blog/frontend
    container_name: blog-frontend
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - blog-backend

  blog-backend:
    build:
      context: ./apps/blog/backend
    container_name: blog-backend
    restart: unless-stopped
    depends_on:
      - blog-db
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@blog-db:5432/akabar_db
    networks:
      - app-network

  blog-db:
    image: postgres:15
    container_name: blog-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=akabar_db
    volumes:
      - blog_db_data:/var/lib/postgresql/data
    networks:
      - app-network
  
  # ---------------------
  #  Monitoring Services 
  # ---------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-akabar}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

  # ---------------------
  #  Databases
  # ---------------------
  mongo:
    image: mongo:latest
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - /mnt/mongo_data/db:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    command: mongod --auth
    networks:
      - app-network

  redis:
    image: redis/redis-stack:latest
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # -----------------------------------
  #  Data Seeding Service
  # -----------------------------------
  redis-seeder:
    build: ./helper_func
    container_name: redis-seeder
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  # -----------------------------------
  #  Nginx Reverse Proxy Service
  # -----------------------------------
  nginx:
    image: nginx:latest
    container_name: akabar-nginx-proxy-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /mnt/mongo_data/certbot/conf:/etc/letsencrypt
      - /mnt/mongo_data/certbot/www:/var/www/certbot
    depends_on:
      - web
      - bff
      - blog-frontend
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /mnt/mongo_data/certbot/conf:/etc/letsencrypt
      - /mnt/mongo_data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

# ---------------------
#  Volumes and Networks
# ---------------------
volumes:
  redis-data:
  certbot-etc:
  certbot-var:
  web-root:
  blog_db_data:
  prometheus_data: {}
  grafana_data: {} 

networks:
  app-network:
    driver: bridge
